<!DOCTYPE html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/shield.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Методики защиты жизни — Справочник угроз</title>
    <meta name="description" content="Практическое руководство по противодействию киберугрозам, социальным и бытовым угрозам." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Syncopate:wght@400;700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      (function () {
        sessionStorage.removeItem('spa-redirect');
        var base = '%BASE_URL%';
        var prefix = base.replace(/\/$/, '');
        var path = location.pathname;
        if (path.indexOf(prefix) === 0 && path.length > prefix.length) {
          var rest = path.slice(prefix.length).replace(/^\//, '');
          if (rest && !location.hash) {
            location.replace(location.origin + base + '#/' + rest + location.search);
            return;
          }
        }
        if (/^\/threat\//.test(path)) {
          location.replace(location.origin + base + '#' + path + location.search);
        }
      })();
    </script>
    <div id="root">
      <p style="margin:0;padding:2rem;font-family:system-ui,sans-serif;color:#e0e0e0;background:#0a0a0a;min-height:100vh">
        Загрузка…
      </p>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
